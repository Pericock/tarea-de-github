<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Biblioteca Funcional</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background: #f0f0f5;
    }

    h1 {
        text-align: center;
        color: #333;
    }

    table {
        border-collapse: collapse;
        width: 60%;
        margin: 0 auto 40px auto;
        background: white;
    }

    th, td {
        border: 1px solid #333;
        padding: 10px;
        text-align: left;
    }

    th {
        background: #222;
        color: white;
    }

    a {
        text-decoration: none;
        color: #0066cc;
        font-weight: bold;
    }

    .ficha {
        border: 2px solid #333;
        padding: 15px;
        margin: 20px auto;
        width: 60%;
        background: #ffffff;
        border-radius: 10px;
    }

    .ficha h2 {
        margin-top: 0;
        color: #222;
    }
</style>

</head>

<body>

<h1>Índice de Libros</h1>

<table>
    <tr>
        <th>Título</th>
        <th>Autor</th>
    </tr>

    <tr>
        <td><a href="#libro1">El Quijote</a></td>
        <td>Miguel de Cervantes</td>
    </tr>
</table>


<h1>Detalles de los Libros</h1>

<div class="ficha" id="libro1">
    <h2>El Quijote</h2>
    <p><strong>Autor:</strong> Miguel de Cervantes</p>
    <p><strong>Año:</strong> 1605</p>
    <p><strong>Páginas:</strong> 1032</p>
    <p><strong>Sinopsis:</strong> Las aventuras de un caballero andante en la Mancha.</p>
</div>

</body>
</html>
